<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پنل مدیریت</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; }
        .sidebar { background: #343a40; min-height: 100vh; }
        .sidebar a { color: #fff; text-decoration: none; }
        .sidebar a:hover { background: #495057; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-2 sidebar p-3">
                <h5 class="text-white">پنل مدیریت</h5>
                <hr class="bg-light">
                <ul class="nav flex-column">
                    <li class="nav-item"><a class="nav-link" href="{% url 'admin_panel:pending_requests' %}">درخواست‌های تأمین‌کننده</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'admin_panel:user_list' %}">لیست کاربران</a></li>
                </ul>
            </div>
            <div class="col-md-10 p-4">
                {% if messages %}
                    {% for message in messages %}
                        <div class="alert alert-{{ message.tags }}">{{ message }}</div>
                    {% endfor %}
                {% endif %}
                {% block content %}{% endblock %}
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
