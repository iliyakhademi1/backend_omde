<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>درخواست‌های تأمین‌کننده</title>
    <style>
        body { font-family: Tahoma, sans-serif; margin: 20px; }
        table { border-collapse: collapse; width: 100%; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: right; }
        th { background-color: #f2f2f2; }
        .btn { padding: 5px 10px; margin: 2px; text-decoration: none; border-radius: 4px; }
        .approve { background-color: green; color: white; }
        .reject { background-color: red; color: white; }
    </style>
</head>
<body>
    <h1>درخواست‌های تأمین‌کننده (در انتظار تأیید)</h1>
    <table>
        <tr><th>ID</th><th>نام کاربری</th><th>شماره موبایل</th><th>نام نمایشی</th><th>عملیات</th></tr>
        {% for user in users %}
     <td>{{ user.phone }}</td>
            <td>{{ user.display_name|default:"—" }}</td>
            <td>
                <a href="/admin-panel/approve/{{ user.id }}/" class="btn approve">تأیید</a>
                <a href="/admin-panel/reject/{{ user.id }}/" class="btn reject">رد</a>
            </td>
        </tr>
        {% empty %}
        <tr><td colspan="5">هیچ درخواستی وجود ندارد.</td></tr>
        {% endfor %}
    </table>
</body>
</html>
